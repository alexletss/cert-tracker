worker_processes  1;
events { worker_connections 1024; }

http {
include       mime.types;
default_type  application/octet-stream;
sendfile      on;
client_max_body_size 50M;

# Логи
access_log __ROOT__/logs/nginx-access.log;
error_log  __ROOT__/logs/nginx-error.log;

# Upstream — PostgREST
upstream postgrest {
    server 127.0.0.1:__POSTGREST_PORT__;
}

server {
    listen       __WEB_PORT__;
    server_name  _;

    # Главная — index.html
    root   __ROOT__/web;
    index  index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API → PostgREST
    location /rest/v1/ {
        # Убрать префикс /rest/v1
        rewrite ^/rest/v1/(.*)$ /$1 break;
        proxy_pass http://postgrest;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        default_type application/json;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' '*';
            return 204;
        }
    }

    # Файлы (storage) — отдаются напрямую из C:\certtracker\files\
    location /storage/v1/object/public/ {
        alias __ROOT__/files/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        autoindex off;
    }

    # Загрузка файлов через PUT/POST
    location /storage/v1/object/ {
        client_body_temp_path __ROOT__/logs/uploads;
        dav_methods PUT DELETE;
        create_full_put_path on;
        dav_access user:rw group:rw all:r;
        alias __ROOT__/files/;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' '*';
            return 204;
        }
    }
}
}
