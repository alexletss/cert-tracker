<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Учёт сертификатов</title>
<style>
:root {
  --bg: #f5f7fa;
  --surface: #ffffff;
  --surface-2: #f0f3f7;
  --surface-hover: #fafbfc;
  --text: #1a1a1a;
  --text-muted: #666;
  --text-faint: #888;
  --border: #e4e7eb;
  --border-input: #d0d5dd;
  --primary: #4a90e2;
  --primary-hover: #357ac9;
  --secondary: #e4e7eb;
  --secondary-hover: #d4d8dc;
  --secondary-text: #333;
  --success: #93C47D;
  --success-hover: #7aae64;
  --danger: #E06666;
  --danger-hover: #c54f4f;
  --warning: #F6B26B;
  --info: #7BD3F7;
  --info-text: #003a5c;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
  --modal-overlay: rgba(0,0,0,0.5);
}
[data-theme="dark"] {
  --bg: #0f1419;
  --surface: #1a1f26;
  --surface-2: #232a33;
  --surface-hover: #242b35;
  --text: #e8eaed;
  --text-muted: #9aa0a6;
  --text-faint: #777f8a;
  --border: #2d3540;
  --border-input: #3a4250;
  --primary: #5da3f0;
  --primary-hover: #4a90e2;
  --secondary: #2d3540;
  --secondary-hover: #3a4250;
  --secondary-text: #e8eaed;
  --success: #93C47D;
  --success-hover: #a8d693;
  --danger: #E06666;
  --danger-hover: #ec7c7c;
  --warning: #F6B26B;
  --info: #7BD3F7;
  --info-text: #003a5c;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --modal-overlay: rgba(0,0,0,0.7);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }
.hidden { display: none !important; }

/* Login */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: var(--surface); border-radius: 12px; box-shadow: var(--shadow); padding: 40px; width: 100%; max-width: 380px; }
.login-card h1 { font-size: 22px; margin-bottom: 24px; text-align: center; color: var(--text); }
.login-card label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-muted); }
.login-card input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-input); border-radius: 8px; font-size: 14px; margin-bottom: 16px; background: var(--surface); color: var(--text); }
.login-card input:focus { outline: none; border-color: var(--primary); }
.login-card button { width: 100%; padding: 11px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.login-card button:hover { background: var(--primary-hover); }
.login-error { color: var(--danger); font-size: 13px; margin-bottom: 12px; text-align: center; }
.login-theme { position: absolute; top: 20px; right: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 16px; color: var(--text); }

/* App */
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.topbar h1 { font-size: 18px; }
.topbar-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }

/* Theme toggle */
.theme-toggle { background: var(--secondary); color: var(--secondary-text); border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; font-size: 16px; }
.theme-toggle:hover { background: var(--secondary-hover); }

/* Tabs */
.tabs { display: flex; gap: 4px; background: var(--surface); padding: 6px; border-radius: 10px; margin-bottom: 16px; box-shadow: var(--shadow-sm); overflow-x: auto; }
.tab { flex: 1; min-width: 120px; padding: 10px 14px; background: transparent; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; color: var(--text-muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.tab:hover { background: var(--surface-2); }
.tab.active { background: var(--primary); color: white; }
.tab-badge { background: rgba(255,255,255,0.25); padding: 1px 7px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.tab:not(.active) .tab-badge { background: var(--surface-2); color: var(--text-muted); }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 20px; }
.stat { background: var(--surface); border-radius: 10px; padding: 16px; border-left: 4px solid #ccc; box-shadow: var(--shadow-sm); }
.stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-value { font-size: 26px; font-weight: 700; margin-top: 4px; color: var(--text); }
.stat-total { border-left-color: var(--primary); }
.stat-expired { border-left-color: var(--danger); }
.stat-soon { border-left-color: var(--warning); }
.stat-ok { border-left-color: var(--success); }
.stat-dekret { border-left-color: var(--info); }

/* Controls */
.controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.controls input, .controls select { padding: 8px 12px; border: 1px solid var(--border-input); border-radius: 8px; font-size: 14px; background: var(--surface); color: var(--text); }
.controls input { flex: 1; min-width: 200px; }

/* Buttons */
.btn { padding: 8px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-secondary { background: var(--secondary); color: var(--secondary-text); }
.btn-secondary:hover { background: var(--secondary-hover); }
.btn-success { background: var(--success); color: white; }
.btn-success:hover { background: var(--success-hover); }
.btn-danger { background: var(--danger); color: white; }
.btn-danger:hover { background: var(--danger-hover); }
.btn-sm { padding: 4px 8px; font-size: 12px; }

/* Table */
.table-wrap { background: var(--surface); border-radius: 10px; overflow: auto; box-shadow: var(--shadow-sm); max-height: 70vh; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { position: sticky; top: 0; background: var(--surface-2); z-index: 10; }
th { padding: 10px 8px; text-align: left; font-weight: 600; color: var(--text); border-bottom: 2px solid var(--border); white-space: nowrap; font-size: 12px; }
td { padding: 8px; border-bottom: 1px solid var(--border); vertical-align: middle; color: var(--text); }
tr:hover td { background: var(--surface-hover); }
.status-cell { font-weight: 600; text-align: center; padding: 6px 10px; border-radius: 6px; font-size: 12px; white-space: nowrap; }
.status-expired { background: var(--danger); color: white; }
.status-soon { background: var(--warning); color: white; }
.status-ok { background: var(--success); color: white; }
.status-dekret { background: var(--info); color: var(--info-text); }
.actions-cell { display: flex; gap: 4px; white-space: nowrap; }
.empty { padding: 40px; text-align: center; color: var(--text-faint); }
.purpose-tag { display: inline-block; padding: 2px 8px; background: var(--surface-2); border-radius: 4px; font-size: 11px; color: var(--text-muted); margin: 1px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: var(--modal-overlay); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal { background: var(--surface); border-radius: 12px; padding: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow: auto; color: var(--text); }
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; color: var(--text-muted); margin-top: 12px; }
.modal input[type="text"], .modal input[type="date"], .modal select { width: 100%; padding: 8px 12px; border: 1px solid var(--border-input); border-radius: 8px; font-size: 14px; background: var(--surface); color: var(--text); }
.modal .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
.modal .checkbox-row label { margin: 0; cursor: pointer; }
.modal .purpose-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; }
.modal .purpose-grid label { display: flex; align-items: center; gap: 6px; padding: 8px 10px; background: var(--surface-2); border-radius: 6px; margin: 0; font-size: 13px; cursor: pointer; color: var(--text); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

@media (max-width: 640px) {
  .topbar { padding: 10px 12px; }
  .container { padding: 12px; }
  th, td { padding: 6px 4px; font-size: 12px; }
  .tab { min-width: 100px; padding: 8px 10px; font-size: 13px; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen" class="login-wrap">
<button class="login-theme" onclick="toggleTheme()" title="Сменить тему">🌙</button>
<div class="login-card">
  <h1>🔐 Учёт сертификатов</h1>
  <div id="loginError" class="login-error hidden"></div>
  <label>Логин</label>
  <input type="text" id="loginUser" autocomplete="username">
  <label>Пароль</label>
  <input type="password" id="loginPass" autocomplete="current-password">
  <button onclick="login()">Войти</button>
</div>
</div>

<!-- APP -->
<div id="appScreen" class="hidden">
<div class="topbar">
  <h1>📋 Учёт сертификатов сотрудников</h1>
  <div class="topbar-actions">
    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Сменить тему">🌙</button>
    <button class="btn btn-primary" onclick="openAddModal()">+ Добавить</button>
    <button class="btn btn-secondary" onclick="exportJSON()">⬇ Экспорт</button>
    <button class="btn btn-secondary" onclick="document.getElementById('importFile').click()">⬆ Импорт</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(event)">
    <button class="btn btn-danger" onclick="logout()">Выйти</button>
  </div>
</div>

<div class="container">
  <!-- Department Tabs -->
  <div class="tabs" id="deptTabs"></div>

  <div class="stats">
    <div class="stat stat-total"><div class="stat-label">Всего</div><div class="stat-value" id="statTotal">0</div></div>
    <div class="stat stat-expired"><div class="stat-label">Просрочено</div><div class="stat-value" id="statExpired">0</div></div>
    <div class="stat stat-soon"><div class="stat-label">Истекает (&lt;2 мес.)</div><div class="stat-value" id="statSoon">0</div></div>
    <div class="stat stat-ok"><div class="stat-label">Действующих</div><div class="stat-value" id="statOk">0</div></div>
    <div class="stat stat-dekret"><div class="stat-label">Декрет</div><div class="stat-value" id="statDekret">0</div></div>
  </div>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="🔍 Поиск по фамилии, имени, отчеству..." oninput="render()">
    <select id="filterStatus" onchange="render()">
      <option value="all">Все статусы</option>
      <option value="expired">Просрочен</option>
      <option value="soon">Меньше 2 месяцев</option>
      <option value="ok">Больше 2 месяцев</option>
      <option value="dekret">Декрет</option>
    </select>
    <select id="sortBy" onchange="render()">
      <option value="lastname-asc">Фамилия А-Я</option>
      <option value="lastname-desc">Фамилия Я-А</option>
      <option value="date-asc">Срок: ближайшие</option>
      <option value="date-desc">Срок: дальние</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr id="tableHead"></tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>
</div>

<!-- MODAL: Add/Edit -->
<div id="formModal" class="modal-overlay hidden">
<div class="modal">
  <h2 id="formTitle">Добавить сотрудника</h2>
  <input type="hidden" id="formId">
  <label>Подразделение *</label>
  <select id="formDept" onchange="togglePurposeField()">
    <option value="admin">Администрация</option>
    <option value="doctors">Врачи</option>
    <option value="reception">Приёмка</option>
    <option value="kdl">КДЛ</option>
  </select>
  <label>Фамилия *</label>
  <input type="text" id="formLastname">
  <label>Имя *</label>
  <input type="text" id="formFirstname">
  <label>Отчество</label>
  <input type="text" id="formMiddlename">
  <div class="checkbox-row">
    <input type="checkbox" id="formTreasury">
    <label for="formTreasury">Оформлен в Казначействе</label>
  </div>
  <div id="purposeWrap">
    <label>Цель использования</label>
    <div class="purpose-grid">
      <label><input type="checkbox" class="purpose-cb" value="СБИС"> СБИС</label>
      <label><input type="checkbox" class="purpose-cb" value="СУФД"> СУФД</label>
      <label><input type="checkbox" class="purpose-cb" value="ZAKUPKI.GOV"> ZAKUPKI.GOV</label>
      <label><input type="checkbox" class="purpose-cb" value="Web-торги"> Web-торги</label>
    </div>
  </div>
  <label>Срок действия сертификата</label>
  <input type="date" id="formExpiry">
  <div class="checkbox-row">
    <input type="checkbox" id="formDekret">
    <label for="formDekret">Декрет (приоритет над сроком)</label>
  </div>
  <div class="modal-actions">
    <button class="btn btn-secondary" onclick="closeFormModal()">Отмена</button>
    <button class="btn btn-primary" onclick="saveForm()">Сохранить</button>
  </div>
</div>
</div>

<!-- MODAL: Renew -->
<div id="renewModal" class="modal-overlay hidden">
<div class="modal">
  <h2>Обновить сертификат</h2>
  <p style="font-size:13px;color:var(--text-muted);margin-bottom:8px" id="renewSubtitle"></p>
  <input type="hidden" id="renewId">
  <label>Текущая дата (станет «старой»)</label>
  <input type="text" id="renewOldDisplay" disabled>
  <label>Новая дата окончания сертификата *</label>
  <input type="date" id="renewNewDate">
  <div class="modal-actions">
    <button class="btn btn-secondary" onclick="closeRenewModal()">Отмена</button>
    <button class="btn btn-success" onclick="saveRenew()">Обновить</button>
  </div>
</div>
</div>

<script>
const AUTH_USER = "admin";
const AUTH_PASS = "cert2026";
const STORAGE_KEY = "cert_tracker_data_v2";
const AUTH_KEY = "cert_tracker_auth_v1";
const THEME_KEY = "cert_tracker_theme_v1";
const DEPT_KEY = "cert_tracker_dept_v1";

const DEPARTMENTS = [
{ id: "admin", label: "Администрация", icon: "🏛️" },
{ id: "doctors", label: "Врачи", icon: "🩺" },
{ id: "reception", label: "Приёмка", icon: "📥" },
{ id: "kdl", label: "КДЛ", icon: "🧪" },
];

let data = [];
let currentDept = "admin";

// ===== THEME =====
function applyTheme(theme) {
document.documentElement.setAttribute("data-theme", theme);
const btn = document.getElementById("themeBtn");
const loginBtn = document.querySelector(".login-theme");
const icon = theme === "dark" ? "☀️" : "🌙";
if (btn) btn.textContent = icon;
if (loginBtn) loginBtn.textContent = icon;
}
function toggleTheme() {
const cur = document.documentElement.getAttribute("data-theme") || "light";
const next = cur === "dark" ? "light" : "dark";
localStorage.setItem(THEME_KEY, next);
applyTheme(next);
}
applyTheme(localStorage.getItem(THEME_KEY) || "light");

// ===== AUTH =====
function login() {
const u = document.getElementById("loginUser").value.trim();
const p = document.getElementById("loginPass").value;
const err = document.getElementById("loginError");
if (u === AUTH_USER && p === AUTH_PASS) {
  localStorage.setItem(AUTH_KEY, "1");
  err.classList.add("hidden");
  showApp();
} else {
  err.textContent = "Неверный логин или пароль";
  err.classList.remove("hidden");
}
}
function logout() {
localStorage.removeItem(AUTH_KEY);
document.getElementById("appScreen").classList.add("hidden");
document.getElementById("loginScreen").classList.remove("hidden");
document.getElementById("loginUser").value = "";
document.getElementById("loginPass").value = "";
}
function showApp() {
document.getElementById("loginScreen").classList.add("hidden");
document.getElementById("appScreen").classList.remove("hidden");
loadData();
currentDept = localStorage.getItem(DEPT_KEY) || "admin";
renderTabs();
render();
}

document.getElementById("loginPass").addEventListener("keypress", e => { if (e.key === "Enter") login(); });
document.getElementById("loginUser").addEventListener("keypress", e => { if (e.key === "Enter") document.getElementById("loginPass").focus(); });

// ===== DATA =====
function loadData() {
const raw = localStorage.getItem(STORAGE_KEY);
data = raw ? JSON.parse(raw) : [];
// migrate v1 -> v2 (assign dept=admin if missing)
const oldRaw = localStorage.getItem("cert_tracker_data_v1");
if (oldRaw && data.length === 0) {
  const old = JSON.parse(oldRaw);
  data = old.map(p => ({ ...p, dept: p.dept || "admin", purposes: p.purposes || [] }));
  saveData();
}
data = data.map(p => ({ dept: "admin", purposes: [], ...p }));
}
function saveData() {
localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

// ===== TABS =====
function renderTabs() {
const tabsEl = document.getElementById("deptTabs");
tabsEl.innerHTML = DEPARTMENTS.map(d => {
  const count = data.filter(p => (p.dept || "admin") === d.id).length;
  return `<button class="tab ${currentDept === d.id ? "active" : ""}" onclick="switchDept('${d.id}')">
    ${d.icon} ${d.label} <span class="tab-badge">${count}</span>
  </button>`;
}).join("");
}
function switchDept(deptId) {
currentDept = deptId;
localStorage.setItem(DEPT_KEY, deptId);
renderTabs();
render();
}

// ===== STATUS LOGIC =====
function computeStatus(person) {
if (person.dekret) return { key: "dekret", label: "Декрет", cls: "status-dekret" };
if (!person.expiry) return { key: "none", label: "—", cls: "" };
const today = new Date(); today.setHours(0,0,0,0);
const exp = new Date(person.expiry); exp.setHours(0,0,0,0);
const diffDays = Math.floor((exp - today) / (1000*60*60*24));
if (diffDays < 0) return { key: "expired", label: "Просрочен", cls: "status-expired" };
if (diffDays <= 61) return { key: "soon", label: "Меньше 2 месяцев", cls: "status-soon" };
return { key: "ok", label: "Больше 2 месяцев", cls: "status-ok" };
}

function formatDate(iso) {
if (!iso) return "";
const [y,m,d] = iso.split("-");
return `${d}.${m}.${y}`;
}

// ===== RENDER =====
function renderTableHead() {
const head = document.getElementById("tableHead");
const cols = [
  "<th>№</th>",
  "<th>Фамилия</th>",
  "<th>Имя</th>",
  "<th>Отчество</th>",
  "<th>Казн.</th>",
];
if (currentDept === "admin") cols.push("<th>Цель использования</th>");
cols.push(
  "<th>Срок действия</th>",
  "<th>Срок старого</th>",
  "<th>Статус</th>",
  "<th>Действия</th>"
);
head.innerHTML = cols.join("");
}

function render() {
renderTableHead();
const search = document.getElementById("searchInput").value.toLowerCase().trim();
const filter = document.getElementById("filterStatus").value;
const sort = document.getElementById("sortBy").value;

let list = data
  .filter(p => (p.dept || "admin") === currentDept)
  .map(p => ({ ...p, _status: computeStatus(p) }));

if (search) {
  list = list.filter(p =>
    (p.lastname||"").toLowerCase().includes(search) ||
    (p.firstname||"").toLowerCase().includes(search) ||
    (p.middlename||"").toLowerCase().includes(search)
  );
}
if (filter !== "all") list = list.filter(p => p._status.key === filter);

list.sort((a,b) => {
  if (sort === "lastname-asc") return (a.lastname||"").localeCompare(b.lastname||"", "ru");
  if (sort === "lastname-desc") return (b.lastname||"").localeCompare(a.lastname||"", "ru");
  if (sort === "date-asc") return (a.expiry||"9999") < (b.expiry||"9999") ? -1 : 1;
  if (sort === "date-desc") return (a.expiry||"0") > (b.expiry||"0") ? -1 : 1;
  return 0;
});

const deptTotal = data.filter(p => (p.dept || "admin") === currentDept).length;
const tbody = document.getElementById("tableBody");
const colCount = currentDept === "admin" ? 10 : 9;

if (list.length === 0) {
  tbody.innerHTML = `<tr><td colspan="${colCount}" class="empty">${deptTotal === 0 ? "В этом подразделении ещё нет записей. Нажмите «Добавить»." : "Ничего не найдено"}</td></tr>`;
} else {
  tbody.innerHTML = list.map((p,i) => {
    const purposeCell = currentDept === "admin"
      ? `<td>${(p.purposes||[]).map(pp => `<span class="purpose-tag">${escapeHtml(pp)}</span>`).join("") || ""}</td>`
      : "";
    return `
    <tr>
      <td>${i+1}</td>
      <td><strong>${escapeHtml(p.lastname||"")}</strong></td>
      <td>${escapeHtml(p.firstname||"")}</td>
      <td>${escapeHtml(p.middlename||"")}</td>
      <td style="text-align:center">${p.treasury ? "✓" : ""}</td>
      ${purposeCell}
      <td>${formatDate(p.expiry)}</td>
      <td style="color:var(--text-faint)">${formatDate(p.oldExpiry)}</td>
      <td><span class="status-cell ${p._status.cls}">${p._status.label}</span></td>
      <td class="actions-cell">
        <button class="btn btn-success btn-sm" onclick="openRenewModal('${p.id}')" title="Обновить сертификат">🔄</button>
        <button class="btn btn-secondary btn-sm" onclick="openEditModal('${p.id}')" title="Редактировать">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteRow('${p.id}')" title="Удалить">🗑</button>
      </td>
    </tr>`;
  }).join("");
}

const deptData = data.filter(p => (p.dept || "admin") === currentDept);
const all = deptData.map(p => computeStatus(p));
document.getElementById("statTotal").textContent = deptData.length;
document.getElementById("statExpired").textContent = all.filter(s => s.key === "expired").length;
document.getElementById("statSoon").textContent = all.filter(s => s.key === "soon").length;
document.getElementById("statOk").textContent = all.filter(s => s.key === "ok").length;
document.getElementById("statDekret").textContent = all.filter(s => s.key === "dekret").length;

renderTabs();
}

function escapeHtml(s) {
return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
}

// ===== MODALS =====
function togglePurposeField() {
const dept = document.getElementById("formDept").value;
document.getElementById("purposeWrap").style.display = dept === "admin" ? "block" : "none";
}

function openAddModal() {
document.getElementById("formTitle").textContent = "Добавить сотрудника";
document.getElementById("formId").value = "";
document.getElementById("formDept").value = currentDept;
document.getElementById("formLastname").value = "";
document.getElementById("formFirstname").value = "";
document.getElementById("formMiddlename").value = "";
document.getElementById("formTreasury").checked = false;
document.getElementById("formExpiry").value = "";
document.getElementById("formDekret").checked = false;
document.querySelectorAll(".purpose-cb").forEach(cb => cb.checked = false);
togglePurposeField();
document.getElementById("formModal").classList.remove("hidden");
}
function openEditModal(id) {
const p = data.find(x => x.id === id);
if (!p) return;
document.getElementById("formTitle").textContent = "Редактировать сотрудника";
document.getElementById("formId").value = p.id;
document.getElementById("formDept").value = p.dept || "admin";
document.getElementById("formLastname").value = p.lastname || "";
document.getElementById("formFirstname").value = p.firstname || "";
document.getElementById("formMiddlename").value = p.middlename || "";
document.getElementById("formTreasury").checked = !!p.treasury;
document.getElementById("formExpiry").value = p.expiry || "";
document.getElementById("formDekret").checked = !!p.dekret;
document.querySelectorAll(".purpose-cb").forEach(cb => {
  cb.checked = (p.purposes || []).includes(cb.value);
});
togglePurposeField();
document.getElementById("formModal").classList.remove("hidden");
}
function closeFormModal() { document.getElementById("formModal").classList.add("hidden"); }

function saveForm() {
const id = document.getElementById("formId").value;
const dept = document.getElementById("formDept").value;
const purposes = dept === "admin"
  ? Array.from(document.querySelectorAll(".purpose-cb")).filter(cb => cb.checked).map(cb => cb.value)
  : [];
const payload = {
  dept,
  lastname: document.getElementById("formLastname").value.trim(),
  firstname: document.getElementById("formFirstname").value.trim(),
  middlename: document.getElementById("formMiddlename").value.trim(),
  treasury: document.getElementById("formTreasury").checked,
  expiry: document.getElementById("formExpiry").value,
  dekret: document.getElementById("formDekret").checked,
  purposes,
};
if (!payload.lastname || !payload.firstname) {
  alert("Заполните фамилию и имя");
  return;
}
if (id) {
  const idx = data.findIndex(x => x.id === id);
  if (idx !== -1) data[idx] = { ...data[idx], ...payload };
} else {
  data.push({ id: genId(), oldExpiry: "", ...payload });
}
saveData();
closeFormModal();
if (dept !== currentDept) switchDept(dept);
else render();
}

function deleteRow(id) {
const p = data.find(x => x.id === id);
if (!p) return;
if (!confirm(`Удалить запись: ${p.lastname} ${p.firstname}?`)) return;
data = data.filter(x => x.id !== id);
saveData();
render();
}

function openRenewModal(id) {
const p = data.find(x => x.id === id);
if (!p) return;
document.getElementById("renewId").value = id;
document.getElementById("renewSubtitle").textContent = `${p.lastname} ${p.firstname} ${p.middlename||""}`.trim();
document.getElementById("renewOldDisplay").value = formatDate(p.expiry) || "(не указана)";
document.getElementById("renewNewDate").value = "";
document.getElementById("renewModal").classList.remove("hidden");
}
function closeRenewModal() { document.getElementById("renewModal").classList.add("hidden"); }

function saveRenew() {
const id = document.getElementById("renewId").value;
const newDate = document.getElementById("renewNewDate").value;
if (!newDate) { alert("Укажите новую дату"); return; }
const idx = data.findIndex(x => x.id === id);
if (idx === -1) return;
data[idx].oldExpiry = data[idx].expiry || "";
data[idx].expiry = newDate;
saveData();
closeRenewModal();
render();
}

// ===== EXPORT / IMPORT =====
function exportJSON() {
const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
const url = URL.createObjectURL(blob);
const a = document.createElement("a");
a.href = url;
a.download = `certificates_${new Date().toISOString().slice(0,10)}.json`;
a.click();
URL.revokeObjectURL(url);
}
function importJSON(event) {
const file = event.target.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = e => {
  try {
    const imported = JSON.parse(e.target.result);
    if (!Array.isArray(imported)) throw new Error("Файл должен содержать массив");
    if (!confirm(`Импортировать ${imported.length} записей? Текущие данные будут заменены.`)) return;
    data = imported.map(p => ({ id: p.id || genId(), oldExpiry: "", dept: "admin", purposes: [], ...p }));
    saveData();
    render();
    alert(`Импортировано: ${data.length} записей`);
  } catch (err) {
    alert("Ошибка чтения файла: " + err.message);
  }
};
reader.readAsText(file);
event.target.value = "";
}

// ===== INIT =====
if (localStorage.getItem(AUTH_KEY) === "1") {
showApp();
}
</script>
