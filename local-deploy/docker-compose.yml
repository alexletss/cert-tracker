version: "3.8"

services:
postgres:
  image: postgres:15
  container_name: certtracker-postgres
  restart: unless-stopped
  environment:
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    POSTGRES_DB: certtracker
  volumes:
    - ./data/postgres:/var/lib/postgresql/data
    - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
  ports:
    - "5432:5432"
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U postgres"]
    interval: 5s
    timeout: 5s
    retries: 10

postgrest:
  image: postgrest/postgrest:v12.0.2
  container_name: certtracker-postgrest
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  environment:
    PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/certtracker
    PGRST_DB_SCHEMAS: public
    PGRST_DB_ANON_ROLE: anon
    PGRST_JWT_SECRET: ${JWT_SECRET}
    PGRST_DB_USE_LEGACY_GUCS: "false"
    PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
  ports:
    - "3000:3000"

realtime:
  image: supabase/realtime:v2.30.34
  container_name: certtracker-realtime
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  environment:
    PORT: 4000
    DB_HOST: postgres
    DB_PORT: 5432
    DB_USER: postgres
    DB_PASSWORD: ${POSTGRES_PASSWORD}
    DB_NAME: certtracker
    DB_AFTER_CONNECT_QUERY: 'SET search_path TO _realtime'
    DB_ENC_KEY: supabaserealtime
    API_JWT_SECRET: ${JWT_SECRET}
    SECRET_KEY_BASE: ${REALTIME_SECRET_KEY_BASE}
    ERL_AFLAGS: -proto_dist inet_tcp
    ENABLE_TAILSCALE: "false"
    DNS_NODES: "''"
    RLIMIT_NOFILE: "10000"
    APP_NAME: realtime
    SEED_SELF_HOST: "true"
  ports:
    - "4000:4000"

storage:
  image: supabase/storage-api:v1.0.6
  container_name: certtracker-storage
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
  environment:
    ANON_KEY: ${ANON_KEY}
    SERVICE_KEY: ${SERVICE_KEY}
    POSTGREST_URL: http://postgrest:3000
    PGRST_JWT_SECRET: ${JWT_SECRET}
    DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/certtracker
    FILE_SIZE_LIMIT: 52428800
    STORAGE_BACKEND: file
    FILE_STORAGE_BACKEND_PATH: /var/lib/storage
    TENANT_ID: stub
    REGION: local
    GLOBAL_S3_BUCKET: stub
    ENABLE_IMAGE_TRANSFORMATION: "false"
  volumes:
    - ./data/storage:/var/lib/storage
  ports:
    - "5000:5000"

kong:
  image: kong:3.4
  container_name: certtracker-kong
  restart: unless-stopped
  environment:
    KONG_DATABASE: "off"
    KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
    KONG_DNS_ORDER: LAST,A,CNAME
    KONG_PLUGINS: request-transformer,cors,key-auth,acl
  volumes:
    - ./kong.yml:/home/kong/kong.yml:ro
  ports:
    - "8000:8000"
    - "8443:8443"

nginx:
  image: nginx:alpine
  container_name: certtracker-nginx
  restart: unless-stopped
  volumes:
    - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    - ./nginx/index.html:/usr/share/nginx/html/index.html:ro
  ports:
    - "80:80"
